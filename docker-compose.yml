services:
  financialtransactions.api:
    container_name: financialtransactions-api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=financial_transactions;Username=postgres;Password=postgres
      Redis__ConnectionString: redis:6379
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__Username: guest
      RabbitMq__Password: guest
      RabbitMq__QueueName: financial-transactions
      Elasticsearch__Uri: http://elasticsearch:9200
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      elasticsearch-setup:
        condition: service_completed_successfully

  postgres:
    container_name: financialtransactions-postgres
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: financial_transactions
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - financialtransactions-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d financial_transactions"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    container_name: financialtransactions-redis
    image: redis:7
    restart: always
    ports:
      - "6379:6379"

  rabbitmq:
    container_name: financialtransactions-rabbitmq
    image: rabbitmq:3-management
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  elasticsearch:
    container_name: financialtransactions-elasticsearch
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    restart: always
    environment:
      discovery.type: single-node
      xpack.security.enabled: false
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - financialtransactions-elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20

  elasticsearch-setup:
    container_name: financialtransactions-elasticsearch-setup
    image: curlimages/curl:8.11.1
    restart: "no"
    depends_on:
      elasticsearch:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "Waiting for Elasticsearch..."

        until curl -s http://elasticsearch:9200 >/dev/null; do
          sleep 2
        done

        echo "Creating index template for financial transaction logs..."

        curl -s -X PUT "http://elasticsearch:9200/_index_template/logs-financial-transactions-template" \
          -H "Content-Type: application/json" \
          -d '
        {
          "index_patterns": ["logs-financial-transactions-*"],
          "data_stream": {},
          "priority": 500,
          "template": {
            "settings": {
              "number_of_shards": 1,
              "number_of_replicas": 0
            },
            "mappings": {
              "properties": {
                "@timestamp": {
                  "type": "date"
                },
                "message": {
                  "type": "text"
                },
                "log.level": {
                  "type": "keyword"
                },
                "Application": {
                  "type": "keyword"
                },
                "Environment": {
                  "type": "keyword"
                },
                "EventId": {
                  "type": "keyword"
                },
                "AccountId": {
                  "type": "keyword"
                },
                "Type": {
                  "type": "keyword"
                },
                "Amount": {
                  "type": "double"
                },
                "CurrentBalance": {
                  "type": "double"
                }
              }
            }
          }
        }
        '

        echo "Creating data stream..."

        curl -s -X PUT "http://elasticsearch:9200/_data_stream/logs-financial-transactions-development" || true

        echo "Elasticsearch setup completed."

  kibana:
    container_name: financialtransactions-kibana
    image: docker.elastic.co/kibana/kibana:8.15.0
    restart: always
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
      elasticsearch-setup:
        condition: service_completed_successfully

volumes:
  financialtransactions-postgres-data:
  financialtransactions-elasticsearch-data: